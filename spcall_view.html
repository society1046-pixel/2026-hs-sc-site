<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>형석고 체육대회 실시간 호출</title>
  <style>
    body { font-family: 'Apple SD Gothic Neo', sans-serif; background-color: #0B0F1A; margin: 0; color: #F9FAFB; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    
    .navbar { background-color: #111827; padding: 15px; text-align: center; font-size: 20px; font-weight: 800; border-bottom: 1px solid #1F2937; letter-spacing: 1px; }

    .main-layout { display: flex; flex: 1; overflow: hidden; }

    /* 방송 영역 (여전히 크게 유지) */
    .broadcast-side { 
      flex: 0.7; 
      background-color: #0B0F1A;
      display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px;
      border-right: 1px solid #1F2937;
    }

    /* 대기열 영역 */
    .list-side { 
      flex: 0.3; 
      background-color: #0B0F1A; 
      display: flex; flex-direction: column; padding: 20px 15px; overflow-y: auto; 
    }

    .label { font-size: 11px; color: #4B5563; margin-bottom: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; text-align: center; }

    /* 메인 방송 카드 */
    .active-card { 
      width: 100%; max-width: 800px; background: #FFFFFF; color: #111827; 
      padding: 80px 40px; border-radius: 40px; text-align: center; 
      box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
      animation: fadeInZoom 0.4s ease-out;
    }
    @keyframes fadeInZoom { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }

    .active-target { font-size: 60px; font-weight: 900; color: #000000; margin-bottom: 25px; }
    .active-info { font-size: 42px; line-height: 1.5; color: #374151; font-weight: 700; }
    .active-info b { color: #000000; font-size: 50px; text-decoration: underline; text-underline-offset: 10px; text-decoration-thickness: 4px; }
    .active-caller { margin-top: 40px; font-size: 16px; color: #9CA3AF; font-weight: 600; }

    /* 대기열 카드 */
    .wait-card { 
      background: #111827; padding: 12px 20px; border-radius: 12px; margin-bottom: 8px; 
      position: relative; border: 1px solid #1F2937; display: flex; flex-direction: column; justify-content: center;
      transition: all 0.3s ease;
    }
    .wait-card.done { background: #064E3B !important; border-color: #10B981 !important; opacity: 1; }

    .wait-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .wait-target { font-size: 15px; font-weight: 800; color: #E5E7EB; }
    .wait-caller { font-size: 10px; color: #4B5563; margin-top: 4px; font-weight: normal; }
    
    .wait-card.done .wait-target { color: #D1FAE5; }
    .wait-card.done .wait-info { color: #6EE7B7; }
    .wait-card.done .wait-caller { color: #34D399; opacity: 0.8; }

    .status-pill { font-size: 9px; padding: 2px 8px; border-radius: 4px; font-weight: 800; border: 1px solid currentColor; margin-left: 10px; }
    .pill-wait { color: #9CA3AF; border-color: #374151; }
    .pill-done { color: #FFFFFF !important; background-color: #10B981 !important; border-color: #10B981 !important; }

    .overlay { position: fixed; inset: 0; background: #0B0F1A; z-index: 100; display: flex; align-items: center; justify-content: center; }
    .start-btn { background: #F9FAFB; color: #0B0F1A; border: none; padding: 18px 45px; border-radius: 12px; font-size: 18px; font-weight: 800; cursor: pointer; }
  </style>
</head>
<body>

  <div id="setupArea" class="overlay">
    <button class="start-btn" id="audioInitBtn">시스템 시작</button>
  </div>

  <div class="navbar">형석고 체육대회 실시간 호출</div>

  <div class="main-layout">
    <div class="broadcast-side">
      <div class="label">On Air</div>
      <div id="activeArea" style="width:100%; display:flex; justify-content:center;">
        <div style="color:#374151;">대기 중인 호출이 없습니다.</div>
      </div>
    </div>

    <div class="list-side">
      <div class="label">Waitlist</div>
      <div id="queueArea"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBFuDwM5L_eeHzu1j7gG1Z69GT0wkQXyY8",
        authDomain: "hshs-sports-day.firebaseapp.com",
        projectId: "hshs-sports-day",
        storageBucket: "hshs-sports-day.firebasestorage.app",
        messagingSenderId: "187838301266",
        appId: "1:187838301266:web:0af26e391bdf24a3e04b8b",
        measurementId: "G-JQ9ZPFGCG7"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let audioEnabled = false;
    let playedIds = new Set(); 
    let currentlyReadingId = null; 
    let allCalls = [];
    let isFirstLoad = true;

    // 🔥 시작 버튼: 패드/모바일 오디오 권한 획득 (유지)
    document.getElementById("audioInitBtn").addEventListener("click", () => {
      const initSpeech = new SpeechSynthesisUtterance('알림 시스템을 시작합니다.');
      initSpeech.lang = 'ko-KR';
      window.speechSynthesis.speak(initSpeech);

      audioEnabled = true;
      document.getElementById("setupArea").style.display = "none";
      startListening(); 
    });

    function startListening() {
      onSnapshot(query(collection(db, "calls"), orderBy("createdAt", "desc")), (snapshot) => {
        allCalls = [];
        snapshot.forEach(doc => allCalls.push({ id: doc.id, ...doc.data() }));
        renderUI();

        snapshot.docChanges().forEach(change => {
          if (change.type === "added" && !isFirstLoad && audioEnabled) {
            const d = change.doc.data();
            const cid = change.doc.id;
            if (!playedIds.has(cid)) {
              playedIds.add(cid);
              playTTS(d, cid);
            }
          }
        });
        isFirstLoad = false;
      });
    }

    function renderUI() {
      const activeArea = document.getElementById("activeArea");
      const queueArea = document.getElementById("queueArea");
      let activeHtml = "";
      let queueHtml = "";

      allCalls.forEach(d => {
        const targetStr = (d.targetGrade == 0 ? "전학년" : d.targetGrade + "학년") + " " + (d.targetClass == 0 ? "전체반" : d.targetClass + "반");
        
        if (d.id === currentlyReadingId) {
          activeHtml = `
            <div class="active-card">
              <div class="active-target">${targetStr}</div>
              <div class="active-info">
                <b>${d.location}</b>(으)로<br>
                <b>${d.dueTime}</b>까지 모여주세요
              </div>
              <div class="active-caller">발신: ${d.callerName}</div>
            </div>
          `;
        } else {
          queueHtml += `
            <div class="wait-card ${d.isArrived ? 'done' : ''}">
              <div class="wait-header">
                <span class="wait-target">${targetStr}</span>
                <span class="status-pill ${d.isArrived ? 'pill-done' : 'pill-wait'}">${d.isArrived ? '도착' : '대기'}</span>
              </div>
              <div class="wait-info">${d.location} | ${d.dueTime}</div>
              <div class="wait-caller">발신: ${d.callerName}</div>
            </div>
          `;
        }
      });
      activeArea.innerHTML = activeHtml || `<div style="color:#374151; font-size:18px;">현재 진행 중인 호출이 없습니다.</div>`;
      queueArea.innerHTML = queueHtml || `<div style="color:#374151; text-align:center; font-size:12px;">목록이 비어있습니다.</div>`;
    }

    function playTTS(data, id) {
      const targetStr = (data.targetGrade == 0 ? "전학년" : data.targetGrade + "학년") + " " + (data.targetClass == 0 ? "전체반" : data.targetClass + "반");
      const textToRead = `${targetStr}, ${data.location}으로 ${data.dueTime}까지 모여주세요.`;

      // 🔥 핵심 해결책: onstart 이벤트를 믿지 않고 여기서 바로 화면 업데이트!
      currentlyReadingId = id;
      renderUI(); 

      // 음성 읽기
      const uttr = new SpeechSynthesisUtterance(textToRead);
      uttr.lang = 'ko-KR';
      uttr.rate = 0.9;
      window.speechSynthesis.speak(uttr);

      // 🔥 핵심 해결책: onend 이벤트를 믿지 않고 8초(8000ms) 뒤에 강제로 화면 복구!
      // (음성을 읽는 시간이 더 길다면 이 숫자를 9000이나 10000으로 늘려주세요)
      setTimeout(() => {
        if (currentlyReadingId === id) { // 그 사이 다른 알림이 오지 않았다면 초기화
          currentlyReadingId = null;
          renderUI();
        }
      }, 8000); 
    }
  </script>
</body>
</html>
