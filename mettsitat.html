<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>신청 관리자 센터 (mettsitat)</title>
  <style>
    body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background-color: #F4F7FB; margin: 0; padding: 20px; color: #4A5568; }
    .container { max-width: 800px; margin: 0 auto; }
    .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
    h3 { color: #7BA4DB; margin-top: 0; border-bottom: 2px solid #EAF0F6; padding-bottom: 10px; }
    .form-group { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; }
    input, select { padding: 10px; border: 1px solid #DCE4EC; border-radius: 8px; flex-grow: 1; outline: none; }
    button { padding: 10px 15px; background-color: #7BA4DB; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; white-space: nowrap; }
    button:hover { background-color: #5A88C7; }
    .del-btn { background-color: #F19C99; padding: 6px 10px; font-size: 12px; }
    table { width: 100%; border-collapse: collapse; text-align: center; font-size: 14px; }
    th { background-color: #F4F7FB; padding: 10px; border-bottom: 2px solid #DCE4EC; }
    td { padding: 10px; border-bottom: 1px solid #EAF0F6; }
  </style>
  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwEIBKkR6Wt4hq0-6kzD8Wjhwm_GmZ-6shbYdpIxt3F6R-Zi-DplK3CaFoEZGPj2F4hzg/exec"; 
    
    // 선생님(45) & 관리자(46)만 접근 허용
    const userRole = parseInt(sessionStorage.getItem('userRole') || 0);
    if (userRole !== 45 && userRole !== 46) {
      alert("선생님 및 관리자 전용 페이지입니다.");
      window.location.href = "main.html";
    }

    function loadAdminData() {
      // 설정(시간) 불러오기 및 명단 불러오기
      fetch(`${API_URL}?action=getMettsiAdminData`)
        .then(res => res.json())
        .then(data => {
            if(data.success) {
                document.getElementById('startTime').value = data.settings.start;
                document.getElementById('endTime').value = data.settings.end;
                renderTable(data.list);
            }
        });
    }

    function renderTable(list) {
        let html = '';
        list.forEach((row, index) => {
            // row: [날짜, 타임, 신청자학번, 신청자이름, 파트너학번, 파트너이름, rowIndex(고유번호)]
            html += `<tr>
                      <td>${row[0]}</td>
                      <td>${row[1]}타임</td>
                      <td>${row[2]} (${row[3]})</td>
                      <td>${row[4]} (${row[5]})</td>
                      <td><button class="del-btn" onclick="deleteRecord(${row[6]})">삭제</button></td>
                    </tr>`;
        });
        document.getElementById('admin-table-body').innerHTML = html || "<tr><td colspan='5'>신청자가 없습니다.</td></tr>";
    }

    function saveSettings() {
        const start = document.getElementById('startTime').value;
        const end = document.getElementById('endTime').value;
        fetch(`${API_URL}?action=setMettsiTime&start=${start}&end=${end}`)
            .then(res => res.json())
            .then(data => alert(data.success ? "저장되었습니다." : "오류 발생"));
    }

    function adminAdd() {
        const date = document.getElementById('addDate').value;
        const slot = document.getElementById('addSlot').value;
        const id1 = document.getElementById('addId1').value;
        const id2 = document.getElementById('addId2').value;

        if(!date || !slot || !id1 || !id2) { alert('모두 입력하세요'); return; }

        fetch(`${API_URL}?action=adminAddMettsi&date=${date}&slot=${slot}&id1=${id1}&id2=${id2}`)
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    alert("추가되었습니다.");
                    loadAdminData(); // 새로고침
                } else {
                    alert("추가 실패: " + data.message); // 없는 학번일 경우 등
                }
            });
    }

    function deleteRecord(rowIndex) {
        if(!confirm("정말 삭제하시겠습니까?")) return;
        fetch(`${API_URL}?action=deleteMettsi&rowIndex=${rowIndex}`)
            .then(res => res.json())
            .then(data => {
                if(data.success) loadAdminData();
            });
    }

    window.onload = loadAdminData;
  </script>
</head>
<body>
  <div class="container">
    
    <div class="card">
      <h3>⏰ 신청 오픈/마감 시간 설정</h3>
      <div class="form-group">
        <label>시작 시간</label>
        <input type="time" id="startTime">
        <label>마감 시간</label>
        <input type="time" id="endTime">
        <button onclick="saveSettings()">시간 저장</button>
      </div>
      <p style="font-size: 12px; color: #A0AEC0; margin:0;">* 설정한 시간 외에는 학생들이 신청할 수 없습니다.</p>
    </div>

    <div class="card">
      <h3>➕ 학생 강제 추가</h3>
      <div class="form-group">
        <input type="date" id="addDate">
        <select id="addSlot">
          <option value="1">1번 타임</option>
          <option value="2">2번 타임</option>
        </select>
        <input type="text" id="addId1" placeholder="학번1 (예: 2101)">
        <input type="text" id="addId2" placeholder="학번2 (예: 2102)">
        <button onclick="adminAdd()" style="background-color: #82CA9D;">추가</button>
      </div>
    </div>

    <div class="card">
      <h3>📋 신청자 관리 (삭제)</h3>
      <table>
        <thead>
          <tr>
            <th>날짜</th>
            <th>타임</th>
            <th>신청자 (학번/이름)</th>
            <th>짝꿍 (학번/이름)</th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody id="admin-table-body">
            </tbody>
      </table>
    </div>
    
    <button onclick="window.location.href='main.html'" style="background-color: #A0AEC0;">메인으로 돌아가기</button>
  </div>
</body>
</html>
