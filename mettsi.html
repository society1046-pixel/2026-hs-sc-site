<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>프로그램 신청 (mettsi)</title>
  <style>
    body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background-color: #F4F7FB; margin: 0; padding: 20px; color: #4A5568; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
    h2 { color: #7BA4DB; margin-top: 0; text-align: center; }
    .info-box { background-color: #EAF0F6; padding: 15px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; color: #4A5568; line-height: 1.5; }
    label { font-weight: bold; font-size: 14px; display: block; margin-bottom: 5px; margin-top: 15px; }
    select, input { width: 100%; padding: 12px; border: 1px solid #DCE4EC; border-radius: 8px; box-sizing: border-box; font-size: 14px; outline: none; }
    select:focus, input:focus { border-color: #7BA4DB; }
    button { width: 100%; padding: 14px; background-color: #7BA4DB; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 25px; }
    button:hover { background-color: #5A88C7; }
    .back-btn { background-color: #A0AEC0; margin-top: 10px; }
  </style>
  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwEIBKkR6Wt4hq0-6kzD8Wjhwm_GmZ-6shbYdpIxt3F6R-Zi-DplK3CaFoEZGPj2F4hzg/exec"; 
    
    // 권한 확인
    const userRole = parseInt(sessionStorage.getItem('userRole') || 0);
    const userId = sessionStorage.getItem('userId') || '';
    const userName = sessionStorage.getItem('userName') || '';
    
    const is2ndGrade = userId.length === 4 && userId.startsWith('2');
    const isAuthorized = is2ndGrade || (userRole >= 32 && userRole <= 46);
    
    if (!isAuthorized) {
      alert("접근 권한이 없습니다. (2학년 및 학생회 전용)");
      window.location.href = "main.html";
    }

    function checkDate(element) {
        const day = new Date(element.value).getDay();
        // 1:월, 2:화, 4:목, 5:금 (수=3, 토=6, 일=0)
        if(day === 0 || day === 3 || day === 6) {
            alert("월, 화, 목, 금요일만 신청 가능합니다.");
            element.value = '';
        }
    }

    function submitApplication() {
      const applyDate = document.getElementById('applyDate').value;
      const timeSlot = document.getElementById('timeSlot').value;
      const partnerId = document.getElementById('partnerId').value;

      if (!applyDate || !timeSlot || !partnerId) {
        alert("모든 항목을 입력해주세요."); return;
      }
      if (partnerId === userId) {
        alert("본인의 학번을 파트너로 지정할 수 없습니다."); return;
      }

      const btn = document.getElementById('submitBtn');
      btn.innerText = "신청 중...";
      btn.disabled = true;

      // 구글 앱스 스크립트로 데이터 전송 (action=applyMettsi)
      fetch(`${API_URL}?action=applyMettsi&userId=${userId}&userName=${encodeURIComponent(userName)}&partnerId=${partnerId}&date=${applyDate}&slot=${timeSlot}`, { redirect: 'follow' })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            alert("신청이 완료되었습니다!");
            window.location.href = "mettsita.html"; // 확인 페이지로 이동
          } else {
            alert("신청 실패: " + data.message); // 예: 정원 초과, 이미 신청함, 시간 아님 등
            btn.innerText = "신청하기";
            btn.disabled = false;
          }
        }).catch(err => {
            alert("오류가 발생했습니다.");
            btn.innerText = "신청하기";
            btn.disabled = false;
        });
    }
  </script>
</head>
<body>
  <div class="card">
    <h2>프로그램 신청</h2>
    <div class="info-box">
      - 2인 1조로 신청합니다.<br>
      - 월, 화, 목, 금요일만 가능합니다.<br>
      - 각 타임당 선착순 5팀 제한이 있습니다.<br>
      - 일주일에 1회만 참여 가능합니다.
    </div>

    <label>신청 날짜 (월, 화, 목, 금)</label>
    <input type="date" id="applyDate" onchange="checkDate(this)">

    <label>타임 선택</label>
    <select id="timeSlot">
      <option value="">타임을 선택하세요</option>
      <option value="1">1번 타임 (5팀 제한)</option>
      <option value="2">2번 타임 (5팀 제한)</option>
    </select>

    <label>짝꿍 학번</label>
    <input type="text" id="partnerId" placeholder="예: 2101">

    <button id="submitBtn" onclick="submitApplication()">신청하기</button>
    <button class="back-btn" onclick="window.location.href='main.html'">메인으로 돌아가기</button>
  </div>
</body>
</html>
