<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>체육대회 사용자 관리</title>
  <style>
    body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background-color: #F4F7FB; margin: 0; padding: 0; color: #4A5568; }
    .navbar { background-color: #2D3748; color: white; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; }
    .nav-title { font-size: 18px; font-weight: bold; margin: 0; }
    .back-btn { background: none; border: 1px solid white; color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    
    .container { max-width: 900px; margin: 20px auto; padding: 0 15px; }
    .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
    .card h3 { margin-top: 0; border-bottom: 2px solid #F4F7FB; padding-bottom: 10px; }

    /* 입력 폼 */
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-size: 14px; margin-bottom: 5px; font-weight: bold; }
    .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #DCE4EC; border-radius: 8px; box-sizing: border-box; }
    .add-btn { width: 100%; padding: 12px; background-color: #4A5568; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

    /* 테이블 */
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th { background-color: #EAF0F6; padding: 12px; text-align: left; font-size: 14px; }
    td { padding: 12px; border-bottom: 1px solid #EAF0F6; font-size: 14px; }
    .role-badge { padding: 3px 8px; border-radius: 4px; color: white; font-size: 12px; }
    .del-btn { background-color: #F19C99; color: white; border: none; padding: 5px 8px; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>

  <div class="navbar">
    <button class="back-btn" onclick="location.href='spmain.html'">메인으로</button>
    <p class="nav-title">사용자 계정 관리기</p>
    <div style="width: 70px;"></div>
  </div>

  <div class="container">
    <div class="card">
      <h3>계정 생성</h3>
      <div class="form-group">
        <label>고유번호 (ID / 학번 등)</label>
        <input type="text" id="newId" placeholder="고유번호 입력">
      </div>
      <div class="form-group">
        <label>이름</label>
        <input type="text" id="newName" placeholder="이름 입력">
      </div>
      <div class="form-group">
        <label>권한 설정</label>
        <select id="newRole">
          <option value="student">일반 학생</option>
          <option value="president">반장</option>
          <option value="vice_president">부반장</option>
          <option value="referee">심판</option>
          <option value="teacher">선생님</option>
          <option value="admin">총괄 관리자(Admin)</option>
        </select>
      </div>
      <button class="add-btn" id="createUserBtn">계정 생성하기</button>
    </div>

    <div class="card">
      <h3>등록된 사용자 목록</h3>
      <table id="userTable">
        <thead>
          <tr>
            <th>고유번호</th>
            <th>이름</th>
            <th>권한</th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody id="userList">
          </tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import { getFirestore, collection, setDoc, doc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

    // 🔴 본인 Firebase 설정값 입력
    const firebaseConfig = {
        apiKey: "AIzaSyBFuDwM5L_eeHzu1j7gG1Z69GT0wkQXyY8",
        authDomain: "hshs-sports-day.firebaseapp.com",
        projectId: "hshs-sports-day",
        storageBucket: "hshs-sports-day.firebasestorage.app",
        messagingSenderId: "187838301266",
        appId: "1:187838301266:web:0af26e391bdf24a3e04b8b",
        measurementId: "G-JQ9ZPFGCG7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // [권한 체크] admin이 아니면 퇴출
    const currentRole = sessionStorage.getItem("role");
    if (currentRole !== "admin") {
      alert("접근 권한이 없습니다.");
      location.href = "spmain.html";
    }

    // 1. 사용자 생성
    document.getElementById("createUserBtn").addEventListener("click", async () => {
      const id = document.getElementById("newId").value.trim();
      const name = document.getElementById("newName").value.trim();
      const role = document.getElementById("newRole").value;

      if (!id || !name) {
        alert("ID와 이름을 모두 입력하세요.");
        return;
      }

      try {
        // 'users' 컬렉션에 문서를 생성 (문서 ID를 고유번호로 설정)
        await setDoc(doc(db, "users", id), {
          name: name,
          role: role,
          createdAt: new Date()
        });
        alert("사용자가 등록되었습니다.");
        document.getElementById("newId").value = "";
        document.getElementById("newName").value = "";
      } catch (e) {
        console.error(e);
        alert("등록 실패");
      }
    });

    // 2. 사용자 목록 실시간 로드
    onSnapshot(collection(db, "users"), (snapshot) => {
      const userList = document.getElementById("userList");
      userList.innerHTML = "";

      snapshot.forEach((userDoc) => {
        const data = userDoc.data();
        const userId = userDoc.id;

        // 권한별 뱃지 색상
        const colors = {
          admin: "#2D3748",
          teacher: "#F19C99",
          referee: "#7BA4DB",
          president: "#F6AD55",
          vice_president: "#FBD38D",
          student: "#A0AEC0"
        };

        userList.innerHTML += `
          <tr>
            <td><strong>${userId}</strong></td>
            <td>${data.name}</td>
            <td><span class="role-badge" style="background-color:${colors[data.role]}">${data.role}</span></td>
            <td><button class="del-btn" onclick="deleteUser('${userId}')">삭제</button></td>
          </tr>
        `;
      });
    });

    // 3. 사용자 삭제
    window.deleteUser = async (id) => {
      if (confirm("정말 이 사용자를 삭제하시겠습니까?")) {
        await deleteDoc(doc(db, "users", id));
      }
    };
  </script>
</body>
</html>
